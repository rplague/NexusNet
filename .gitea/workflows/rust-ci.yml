name: Rust CI
on: [push]

jobs:
  build-and-test:
    runs-on: qst001

    steps:
      # 检出代码：从仓库拉取最新代码
      - name: Checkout code manually
        run: |
          git clone --depth 1 --progress https://${{ secrets.GITHUB_TOKEN }}@git.oahd.cn/${{ github.repository }}.git .
          git fetch --depth 1 origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      # 代码格式化检查：确保代码风格统一
      - name: 代码格式化检查 | Check code format
        run: /home/git/.cargo/bin/cargo fmt -- --check

      # 运行测试：保障代码功能正确
      - name: 运行测试 | Run tests
        run: /home/git/.cargo/bin/cargo test --verbose

      # 生产构建：验证项目最终可以成功编译
      - name: 生产构建 | Build in release mode
        run: /home/git/.cargo/bin/cargo build --release